<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
            padding: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 10px;
        }

        .logo p {
            color: #666;
            font-size: 0.95em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .alert {
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 5px;
            display: none;
            font-size: 0.9em;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .demo-users {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }

        .demo-users h3 {
            color: #333;
            font-size: 0.9em;
            margin-bottom: 15px;
            text-align: center;
        }

        .demo-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            background: #f8f9fa;
            color: #333;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .demo-btn:hover {
            background: #e9ecef;
            border-color: #667eea;
        }

        .demo-btn.admin {
            border-left: 4px solid #667eea;
        }

        .demo-btn.cashier {
            border-left: 4px solid #28a745;
        }

        .demo-btn.customer {
            border-left: 4px solid #17a2b8;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 15px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1><i class="fas fa-book"></i></h1>
            <h2>Library System</h2>
            <p>Login to continue</p>
        </div>

        <div class="alert" id="alert"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>

            <button type="submit"><i class="fas fa-sign-in-alt"></i> Login</button>
            <div class="loading" id="loading">
                <div class="spinner"></div>
            </div>
        </form>

        <div class="demo-users">
            <h3><i class="fas fa-user-friends"></i> Demo Accounts</h3>
            <button class="demo-btn admin" onclick="demoLogin('admin', 'admin123')">
                <i class="fas fa-user-shield"></i> Admin - admin / admin123
            </button>
            <button class="demo-btn cashier" onclick="demoLogin('cashier', 'cashier123')">
                <i class="fas fa-user-cashier"></i> Cashier - cashier / cashier123
            </button>
            <button class="demo-btn customer" onclick="demoLogin('customer', 'customer123')">
                <i class="fas fa-user"></i> Customer - customer / customer123
            </button>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert ${type}`;
            setTimeout(() => {
                alert.className = 'alert';
            }, 5000);
        }

        function setLoading(isLoading) {
            document.getElementById('loading').style.display = isLoading ? 'block' : 'none';
            document.querySelector('button[type="submit"]').disabled = isLoading;
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            await performLogin(username, password);
        });

        async function demoLogin(username, password) {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;
            await performLogin(username, password);
        }

        async function performLogin(username, password) {
            setLoading(true);
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Store token
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    showAlert(`✅ Welcome ${data.user.username}!`, 'success');

                    // Redirect based on role
                    setTimeout(() => {
                        const role = data.user.role;
                        if (role === 'Admin') {
                            window.location.href = '/admin.html';
                        } else if (role === 'NhanVienDungQuay') {
                            window.location.href = '/cashier.html';
                        } else if (role === 'KhachHang') {
                            window.location.href = '/customer.html';
                        }
                    }, 1000);
                } else {
                    showAlert(`❌ ${data.error}`, 'error');
                    setLoading(false);
                }
            } catch (error) {
                showAlert(`Error: ${error}`, 'error');
                setLoading(false);
            }
        }

        // Check if already logged in
        window.addEventListener('load', async () => {
            const token = localStorage.getItem('token');
            if (token) {
                try {
                    const response = await fetch(`${API_URL}/auth/verify`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        const role = data.user.role;
                        
                        if (role === 'Admin') {
                            window.location.href = '/admin.html';
                        } else if (role === 'NhanVienDungQuay') {
                            window.location.href = '/cashier.html';
                        } else if (role === 'KhachHang') {
                            window.location.href = '/customer.html';
                        }
                    } else {
                        localStorage.removeItem('token');
                        localStorage.removeItem('user');
                    }
                } catch (error) {
                    console.error('Auth check failed:', error);
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                }
            }
        });
    </script>
</body>
</html>
